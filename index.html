<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米国株 決算リサーチ</title>
<style>
  :root {
    --accent: #0071e3;
    --accent2: #5e5ce6;
    --header-bg: linear-gradient(135deg, #0071e3 0%, #5e5ce6 100%);
    --accent-bg: rgba(0,113,227,.07);
    --accent-border: rgba(0,113,227,.14);
    --accent-shadow: rgba(0,113,227,.20);
    --phone-bg: #f2f7ff;
    --health-bg: linear-gradient(145deg, #f5f2ff, #eef4ff);
    --health-border: rgba(94,92,230,.12);
    --section-color: #5e5ce6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #deeaff 0%, #f0e8ff 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 12px 40px;
    gap: 20px;
  }

  /* ── 検索エリア ── */
  .search-wrap { width: 100%; max-width: 390px; text-align: center; }
  h1 { font-size: 22px; font-weight: 800; color: #1c1c1e; margin-bottom: 6px; }
  .sub-head { font-size: 13px; color: #636366; margin-bottom: 20px; }
  .search-box {
    display: flex; gap: 10px;
    background: #fff;
    border-radius: 18px;
    padding: 8px 8px 8px 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,.10);
  }
  .search-box input {
    flex: 1; border: none; outline: none;
    font-size: 18px; font-weight: 600; color: #1c1c1e;
    background: transparent; text-transform: uppercase;
  }
  .search-box input::placeholder { color: #c7c7cc; font-weight: 400; text-transform: none; }
  .search-box button {
    background: #1c1c1e; color: #fff; border: none;
    border-radius: 12px; padding: 12px 22px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background .15s;
  }
  .search-box button:hover { background: #3a3a3c; }
  .examples { margin-top: 14px; font-size: 12px; color: #8e8e93; }
  .examples span {
    display: inline-block;
    background: rgba(255,255,255,.75); backdrop-filter: blur(4px);
    padding: 5px 13px; border-radius: 20px; margin: 3px;
    cursor: pointer; font-weight: 700; font-size: 12px; color: #1c1c1e;
    transition: background .15s;
  }
  .examples span:hover { background: #fff; }

  /* ── ローディング ── */
  .loading { display: none; text-align: center; color: #636366; font-size: 13px; }
  .loading.on { display: block; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e5e5ea; border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── エラー ── */
  .error-msg {
    display: none; width: 100%; max-width: 390px;
    background: #fff2f2; border-radius: 16px;
    padding: 14px 18px; color: #c0392b;
    font-size: 13px; font-weight: 600; text-align: center;
  }
  .error-msg.on { display: block; }

  /* ── スマホカード ── */
  .phone {
    display: none; width: 390px; max-width: 100%;
    background: var(--phone-bg);
    border-radius: 44px;
    box-shadow: 0 24px 80px var(--accent-shadow), 0 4px 16px rgba(0,0,0,.05);
    overflow: hidden; padding-bottom: 32px;
  }
  .phone.on { display: block; }

  /* ヘッダー */
  .ph-header {
    background: var(--header-bg);
    padding: 22px 20px 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .ph-icon {
    width: 48px; height: 48px; flex-shrink: 0;
    background: rgba(255,255,255,.22); border: 1.5px solid rgba(255,255,255,.45);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .ph-title { font-size: 17px; font-weight: 800; color: #fff; letter-spacing: -.2px; }
  .ph-sub { font-size: 12px; color: rgba(255,255,255,.72); margin-top: 2px; font-weight: 500; }
  .ph-star { margin-left: auto; font-size: 22px; cursor: pointer; }

  /* メタバー */
  .ph-meta {
    background: var(--accent-bg);
    padding: 10px 20px; display: flex; gap: 8px; flex-wrap: wrap;
    font-size: 12px; color: var(--accent);
    border-bottom: 1px solid var(--accent-border);
  }
  .ph-meta span {
    background: rgba(255,255,255,.85);
    border: 1px solid var(--accent-border);
    padding: 4px 12px; border-radius: 20px; font-weight: 600;
  }

  /* セクション */
  .section { margin: 16px 16px 0; }
  .section-title {
    font-size: 11px; font-weight: 800; color: var(--section-color);
    letter-spacing: .9px; text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 7px;
    padding-left: 10px;
    border-left: 3px solid var(--accent);
  }

  /* カード共通 */
  .card {
    background: #fff; border-radius: 20px;
    padding: 16px 18px; margin-bottom: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.09); }

  /* 決算サプライズ */
  .surprise-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .surprise-label { font-size: 13px; color: #555; font-weight: 600; }
  .surprise-values { display: flex; align-items: center; gap: 8px; }
  .val-group { text-align: center; }
  .val-group .num { font-size: 17px; font-weight: 800; color: #1c1c2e; }
  .val-group .sub { font-size: 10px; color: #9ca3af; font-weight: 500; }
  .arrow { font-size: 14px; color: #d1d5db; }
  .badge { font-size: 12px; font-weight: 800; padding: 5px 11px; border-radius: 20px; letter-spacing: .2px; white-space: nowrap; }
  .badge.pos { background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; }
  .badge.neg { background: linear-gradient(135deg, #fee2e2, #fecaca); color: #991b1b; }
  .badge.neu { background: #f3f4f6; color: #6b7280; }
  .divider { border: none; border-top: 1.5px dashed #ebebf0; margin: 12px 0; }

  /* 総合コメント */
  .summary-banner {
    margin-top: 14px; padding: 12px 14px; border-radius: 14px;
    font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 8px; line-height: 1.4;
  }

  /* 健全性カード */
  .health-row { display: flex; gap: 10px; }
  .health-card {
    flex: 1; background: var(--health-bg);
    border-radius: 16px; padding: 14px 10px; text-align: center;
    border: 1px solid var(--health-border);
  }
  .icon-bubble {
    width: 40px; height: 40px; background: rgba(255,255,255,.85);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 20px; margin: 0 auto 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,.07);
  }
  .health-card .value { font-size: 20px; font-weight: 900; margin-bottom: 2px; }
  .health-card .label { font-size: 10px; color: #6b7280; font-weight: 600; }
  .health-card .sub-label { font-size: 10px; color: #9ca3af; margin-top: 2px; }
  .judge-badge { display: inline-block; margin-top: 8px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .judge-reason { font-size: 10px; color: #9ca3af; margin-top: 3px; line-height: 1.3; }

  /* 次回の案内 */
  .next-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
  .next-row .key { font-size: 13px; color: #6b7280; display: flex; align-items: center; gap: 6px; font-weight: 500; }
  .next-row .val { font-size: 14px; font-weight: 700; color: #1c1c2e; }
  .na { color: #d1d5db; font-weight: 400; }

  /* 免責 */
  .disclaimer {
    display: none; font-size: 11px; color: #aeaeb2;
    text-align: center; max-width: 390px;
    line-height: 1.6; padding: 0 12px;
  }
  .disclaimer.on { display: block; }
</style>
</head>
<body>

<div class="search-wrap">
  <h1>📊 米国株 決算リサーチ</h1>
  <p class="sub-head">ティッカーシンボルを入力して最新決算を確認</p>
  <div class="search-box">
    <input id="inp" type="text" placeholder="例: AAPL, NVDA, MSFT" autocomplete="off" spellcheck="false">
    <button onclick="doSearch()">検索</button>
  </div>
  <div class="examples">
    よく使われる銘柄：
    <span onclick="quick('AAPL')">AAPL</span>
    <span onclick="quick('NVDA')">NVDA</span>
    <span onclick="quick('MSFT')">MSFT</span>
    <span onclick="quick('GOOGL')">GOOGL</span>
    <span onclick="quick('AMZN')">AMZN</span>
    <span onclick="quick('META')">META</span>
    <span onclick="quick('TSLA')">TSLA</span>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div><span>データ取得中...</span></div>
<div class="error-msg" id="err"></div>
<div class="phone" id="card"></div>
<p class="disclaimer" id="disc">
  ※ 本情報は参考目的のみです。投資判断はご自身の責任でお願いします。<br>
  データ提供: Yahoo Finance
</p>

<script>
const API_BASE = 'https://us-earnings-research.onrender.com';

async function fetchAPI(ticker) {
  const ac = new AbortController();
  const timer = setTimeout(() => ac.abort(), 58000);
  try {
    const res = await fetch(`${API_BASE}/api/result?ticker=${encodeURIComponent(ticker)}`, {
      signal: ac.signal
    });
    clearTimeout(timer);
    if (!res.ok) throw new Error('データの取得に失敗しました。しばらく後にお試しください。');
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    return d;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウトしました。再度お試しください。');
    throw e;
  }
}

function fmt(v) {
  if (v == null) return null;
  const n = Math.abs(v);
  if (n >= 1e12) return `$${(v/1e12).toFixed(2)}T`;
  if (n >= 1e9)  return `$${(v/1e9).toFixed(2)}B`;
  if (n >= 1e6)  return `$${(v/1e6).toFixed(2)}M`;
  return `$${v.toFixed(2)}`;
}

function judgeMargin(pct) {
  if (pct == null) return null;
  if (pct >= 25) return { text: '優秀', color: '#15803d', bg: '#dcfce7', reason: '売上の4分の1以上が利益に残る' };
  if (pct >= 15) return { text: '良好', color: '#16a34a', bg: '#f0fdf4', reason: '売上から十分な利益を稼いでいる' };
  if (pct >= 8)  return { text: '普通', color: '#92400e', bg: '#fef9c3', reason: '利益は出ているが改善の余地あり' };
  return { text: '注意', color: '#b91c1c', bg: '#fee2e2', reason: '売上に対して利益が少ない状態' };
}

function judgeFcf(val) {
  if (val == null) return null;
  if (val >= 5e9) return { text: '優秀', color: '#15803d', bg: '#dcfce7', reason: '潤沢なキャッシュを創出' };
  if (val >= 5e8) return { text: '良好', color: '#16a34a', bg: '#f0fdf4', reason: '安定したキャッシュ創出' };
  if (val >= 0)   return { text: '普通', color: '#92400e', bg: '#fef9c3', reason: 'わずかなキャッシュ余剰' };
  return { text: '注意', color: '#b91c1c', bg: '#fee2e2', reason: 'キャッシュが流出している' };
}

function surpriseComment(revYoyPct, epsYoyPct) {
  let revScore = 0, epsScore = 0;
  if (revYoyPct != null) {
    if      (revYoyPct >= 20) revScore = 2;
    else if (revYoyPct >=  5) revScore = 1;
    else if (revYoyPct >= -5) revScore = 0;
    else                      revScore = -1;
  }
  if (epsYoyPct != null) {
    if      (epsYoyPct >=  5) epsScore = 2;
    else if (epsYoyPct >=  2) epsScore = 1;
    else if (epsYoyPct >= -2) epsScore = 0;
    else                      epsScore = -1;
  }
  const t = revScore + epsScore;
  if (t >= 4)  return { emoji: '🚀', text: '売上・EPS ともに大幅上振れ。非常に好調な決算！', color: '#14532d', bg: '#dcfce7' };
  if (t >= 2)  return { emoji: '✅', text: '売上・EPS ともに堅調。市場の期待を超えました',   color: '#15803d', bg: '#f0fdf4' };
  if (t === 1) return { emoji: '🟢', text: '概ね好調。一部の指標が予想を上回りました',         color: '#166534', bg: '#f0fdf4' };
  if (t === 0) return { emoji: '🟡', text: '予想通りの着地。大きなサプライズはなし',           color: '#92400e', bg: '#fef9c3' };
  if (t >= -1) return { emoji: '⚠️', text: '一部の指標が予想を下回りました。要注視',          color: '#9a3412', bg: '#fff7ed' };
  return             { emoji: '🔴', text: '売上・EPS ともに予想を下回る軟調な決算',           color: '#b91c1c', bg: '#fee2e2' };
}

function judgeHtml(j) {
  if (!j) return '';
  return `<div><span class="judge-badge" style="background:${j.bg};color:${j.color}">${j.text}</span></div>`
       + `<div class="judge-reason">${j.reason}</div>`;
}

function vg(num, sub) {
  return `<div class="val-group"><div class="num">${num}</div><div class="sub">${sub}</div></div>`;
}

function render(ticker, d) {
  const qLabel = d.quarter || '';

  // ── ヘッダー ──
  let html = `
  <div class="ph-header">
    <div class="ph-icon">📊</div>
    <div>
      <div class="ph-title">${d.company || ticker}</div>
      <div class="ph-sub">${ticker}${qLabel ? ' · ' + qLabel + ' 決算' : ''}</div>
    </div>
    <div class="ph-star">★</div>
  </div>`;

  if (qLabel) {
    html += `<div class="ph-meta"><span>📅 期: ${qLabel}</span></div>`;
  }

  // ── 決算サプライズ ──
  const revActStr = d.rev_actual != null ? fmt(d.rev_actual) : null;
  const revYaStr  = d.rev_year_ago != null ? fmt(d.rev_year_ago) : null;
  const epsActStr = d.eps_actual != null ? `$${d.eps_actual.toFixed(2)}` : null;

  // 売上高行
  let revHtml;
  if (revYaStr && revActStr) {
    const p = d.rev_yoy_pct;
    const cls = p != null ? (p >= 0 ? 'pos' : 'neg') : 'neu';
    const sign = p != null ? (p >= 0 ? '+' : '') : '';
    const badge = p != null ? `<span class="badge ${cls}">${sign}${p.toFixed(1)}%</span>` : '<span class="badge neu">―</span>';
    revHtml = `${vg(revYaStr,'前年同期')}<span class="arrow">→</span>${vg(revActStr,'実績')}${badge}`;
  } else {
    revHtml = `${vg(revActStr || '<span class="na">―</span>','実績')}<span class="badge neu">―</span>`;
  }

  // EPS行
  let epsHtml;
  const epsRef   = d.eps_year_ago != null ? d.eps_year_ago : d.eps_estimate;
  const epsLabel = d.eps_year_ago != null ? '前年同期' : '予想';
  const epsPct   = d.eps_year_ago != null ? d.eps_yoy_pct : d.eps_surprise_pct;
  if (epsRef != null && epsActStr) {
    const cls = epsPct != null ? (epsPct >= 0 ? 'pos' : 'neg') : 'neu';
    const sign = epsPct != null ? (epsPct >= 0 ? '+' : '') : '';
    const badge = epsPct != null ? `<span class="badge ${cls}">${sign}${epsPct.toFixed(1)}%</span>` : '<span class="badge neu">―</span>';
    epsHtml = `${vg(`$${epsRef.toFixed(2)}`,epsLabel)}<span class="arrow">→</span>${vg(epsActStr,'実績')}${badge}`;
  } else {
    epsHtml = `${vg(epsActStr || '<span class="na">―</span>','実績')}<span class="badge neu">―</span>`;
  }

  // 総合コメント
  const sc = surpriseComment(d.rev_yoy_pct, d.eps_yoy_pct != null ? d.eps_yoy_pct : d.eps_surprise_pct);
  const banner = `<div class="summary-banner" style="background:${sc.bg};color:${sc.color}"><span style="font-size:16px">${sc.emoji}</span>${sc.text}</div>`;

  html += `<div class="section">
    <div class="section-title">⚡ 決算サプライズ</div>
    <div class="card">
      <div class="surprise-row">
        <div class="surprise-label">📈 売上高</div>
        <div class="surprise-values">${revHtml}</div>
      </div>
      <hr class="divider">
      <div class="surprise-row">
        <div class="surprise-label">💰 EPS</div>
        <div class="surprise-values">${epsHtml}</div>
      </div>
      ${banner}
    </div>
  </div>`;

  // ── 経営の健全性 ──
  const om = d.op_margin;
  const omColor = om != null ? (om >= 20 ? '#22c55e' : om >= 10 ? '#f59e0b' : '#ef4444') : '#888';
  const omStr   = om != null ? `${om.toFixed(1)}%` : '―';
  const omYoy   = d.op_margin_yoy;
  let omYoyHtml = '前年同月比';
  if (omYoy != null) {
    const sign = omYoy >= 0 ? '▲' : '▼';
    const col  = omYoy >= 0 ? '#22c55e' : '#ef4444';
    omYoyHtml  = `前年同月比 <span style="color:${col};font-weight:700">${sign}${Math.abs(omYoy).toFixed(1)}pt</span>`;
  }

  const fcfVal   = d.fcf;
  const fcfColor = fcfVal != null ? (fcfVal >= 0 ? '#22c55e' : '#ef4444') : '#888';
  const fcfStr   = fcfVal != null ? fmt(fcfVal) : '―';

  html += `<div class="section">
    <div class="section-title">🏥 経営の健全性</div>
    <div class="card">
      <div class="health-row">
        <div class="health-card">
          <div class="icon-bubble">📊</div>
          <div class="value" style="color:${omColor}">${omStr}</div>
          <div class="label">営業利益率</div>
          <div class="sub-label">${omYoyHtml}</div>
          ${judgeHtml(judgeMargin(om))}
        </div>
        <div class="health-card">
          <div class="icon-bubble">💵</div>
          <div class="value" style="color:${fcfColor}">${fcfStr}</div>
          <div class="label">フリーキャッシュフロー</div>
          <div class="sub-label">（現金を生む力）</div>
          ${judgeHtml(judgeFcf(fcfVal))}
        </div>
      </div>
    </div>
  </div>`;

  // ── 次回の案内 ──
  const estLabel    = d.next_date_estimated ? ' <span style="font-size:10px;color:#a0aec0">(目安)</span>' : '';
  const nextDateStr = d.next_date != null ? d.next_date + estLabel : '<span class="na">不明</span>';

  // 次回売上/EPS予想は有料APIが必要なため、データがある場合のみ表示
  const revRow = d.next_rev_est != null
    ? `<hr class="divider"><div class="next-row"><span class="key">📈 次回売上予想</span><span class="val">${fmt(d.next_rev_est)}</span></div>`
    : '';
  const epsRow = d.next_eps_est != null
    ? `<hr class="divider"><div class="next-row"><span class="key">💰 次回EPS予想</span><span class="val">$${d.next_eps_est.toFixed(2)}</span></div>`
    : '';

  html += `<div class="section">
    <div class="section-title">📅 次回の案内</div>
    <div class="card">
      <div class="next-row">
        <span class="key">🗓️ 次回決算予定日</span>
        <span class="val">${nextDateStr}</span>
      </div>
      ${revRow}${epsRow}
    </div>
  </div>`;

  document.getElementById('card').innerHTML = html;
  document.getElementById('card').classList.add('on');
  document.getElementById('disc').classList.add('on');
}

function setLoading(on, msg) {
  const el = document.getElementById('loading');
  el.classList.toggle('on', on);
  const span = el.querySelector('span');
  if (span && msg) span.textContent = msg;
}
function setError(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.classList.toggle('on', !!msg);
}

async function doSearch() {
  const ticker = document.getElementById('inp').value.trim().toUpperCase();
  if (!ticker) return;

  setLoading(true, 'データ取得中...');
  setError('');
  document.getElementById('card').classList.remove('on');
  document.getElementById('disc').classList.remove('on');

  // Render 無料プランはスリープ後の初回起動に最大50秒かかる
  const warmup = setTimeout(() => setLoading(true, 'サーバー起動中... (最大1分かかる場合があります)'), 6000);

  try {
    const data = await fetchAPI(ticker);
    render(ticker, data);
  } catch (e) {
    setError(e.message);
  } finally {
    clearTimeout(warmup);
    setLoading(false);
  }
}

function quick(t) {
  document.getElementById('inp').value = t;
  doSearch();
}

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
