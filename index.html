<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米国株 決算リサーチ</title>
<style>
  :root {
    --accent: #0071e3;
    --accent2: #5e5ce6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(160deg, #deeaff 0%, #f0e8ff 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 12px 40px;
    gap: 20px;
  }

  /* ── 検索エリア ── */
  .search-wrap { width: 100%; max-width: 390px; text-align: center; }
  h1 { font-size: 22px; font-weight: 800; color: #1c1c1e; margin-bottom: 6px; }
  .sub-head { font-size: 13px; color: #636366; margin-bottom: 20px; }
  .search-box {
    display: flex; gap: 10px;
    background: #fff;
    border-radius: 18px;
    padding: 8px 8px 8px 18px;
    box-shadow: 0 4px 20px rgba(0,0,0,.10);
  }
  .search-box input {
    flex: 1; border: none; outline: none;
    font-size: 18px; font-weight: 600; color: #1c1c1e;
    background: transparent; text-transform: uppercase;
  }
  .search-box input::placeholder { color: #c7c7cc; font-weight: 400; text-transform: none; }
  .search-box button {
    background: #1c1c1e; color: #fff; border: none;
    border-radius: 12px; padding: 12px 22px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: background .15s;
  }
  .search-box button:hover { background: #3a3a3c; }
  .examples { margin-top: 14px; font-size: 12px; color: #8e8e93; }
  .examples span {
    display: inline-block;
    background: rgba(255,255,255,.75); backdrop-filter: blur(4px);
    padding: 5px 13px; border-radius: 20px; margin: 3px;
    cursor: pointer; font-weight: 700; font-size: 12px; color: #1c1c1e;
    transition: background .15s;
  }
  .examples span:hover { background: #fff; }

  /* ── ローディング ── */
  .loading { display: none; text-align: center; color: #636366; font-size: 13px; }
  .loading.on { display: block; }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #e5e5ea; border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    margin: 0 auto 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── エラー ── */
  .error-msg {
    display: none; width: 100%; max-width: 390px;
    background: #fff2f2; border-radius: 16px;
    padding: 14px 18px; color: #c0392b;
    font-size: 13px; font-weight: 600; text-align: center;
  }
  .error-msg.on { display: block; }

  /* ── スマホカード ── */
  .phone {
    display: none; width: 390px; max-width: 100%;
    background: #f2f7ff; border-radius: 44px;
    box-shadow: 0 24px 80px rgba(0,113,227,.20), 0 4px 16px rgba(0,0,0,.05);
    overflow: hidden; padding-bottom: 32px;
  }
  .phone.on { display: block; }

  .ph-header {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    padding: 22px 20px 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .ph-icon {
    width: 48px; height: 48px; flex-shrink: 0;
    background: rgba(255,255,255,.22); border: 1.5px solid rgba(255,255,255,.45);
    border-radius: 14px; display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }
  .ph-title { font-size: 17px; font-weight: 700; color: #fff; }
  .ph-sub { font-size: 12px; color: rgba(255,255,255,.75); margin-top: 2px; }
  .ph-price { margin-left: auto; text-align: right; }
  .ph-price-val { font-size: 20px; font-weight: 800; color: #fff; }
  .ph-price-chg { font-size: 12px; color: rgba(255,255,255,.85); }

  .section {
    margin: 14px 16px 0;
    background: #fff; border-radius: 20px;
    padding: 14px 18px;
    box-shadow: 0 2px 8px rgba(0,0,0,.05);
  }
  .sec-title {
    font-size: 11px; font-weight: 700; color: var(--accent2);
    text-transform: uppercase; letter-spacing: .6px; margin-bottom: 10px;
  }
  .row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 9px 0; border-bottom: 1px solid #f2f2f7;
  }
  .row:last-child { border-bottom: none; }
  .row-label { font-size: 13px; color: #636366; font-weight: 500; }
  .row-right { text-align: right; }
  .row-val { font-size: 13px; font-weight: 700; color: #1c1c1e; }
  .no-data { color: #aeaeb2; font-weight: 500; }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    border-radius: 8px; padding: 2px 8px;
    font-size: 11px; font-weight: 700; margin-top: 4px;
  }
  .badge.beat { background: rgba(48,209,88,.12); color: #1a7a36; }
  .badge.miss { background: rgba(255,59,48,.10); color: #c0392b; }
  .badge.neu  { background: #f2f2f7; color: #636366; }
  .hint { font-size: 11px; color: #aeaeb2; margin-top: 3px; }

  .footer-date {
    text-align: center; margin-top: 14px;
    font-size: 11px; color: #aeaeb2;
  }

  /* ── 免責 ── */
  .disclaimer {
    display: none; font-size: 11px; color: #aeaeb2;
    text-align: center; max-width: 390px;
    line-height: 1.6; padding: 0 12px;
  }
  .disclaimer.on { display: block; }
</style>
</head>
<body>

<div class="search-wrap">
  <h1>📊 米国株 決算リサーチ</h1>
  <p class="sub-head">ティッカーシンボルを入力して最新決算を確認</p>
  <div class="search-box">
    <input id="inp" type="text" placeholder="例: AAPL, NVDA, MSFT" autocomplete="off" spellcheck="false">
    <button onclick="doSearch()">検索</button>
  </div>
  <div class="examples">
    よく使われる銘柄：
    <span onclick="quick('AAPL')">AAPL</span>
    <span onclick="quick('NVDA')">NVDA</span>
    <span onclick="quick('MSFT')">MSFT</span>
    <span onclick="quick('GOOGL')">GOOGL</span>
    <span onclick="quick('AMZN')">AMZN</span>
    <span onclick="quick('META')">META</span>
    <span onclick="quick('TSLA')">TSLA</span>
  </div>
</div>

<div class="loading" id="loading"><div class="spinner"></div>データ取得中...</div>
<div class="error-msg" id="err"></div>
<div class="phone" id="card"></div>
<p class="disclaimer" id="disc">
  ※ 本情報は参考目的のみです。投資判断はご自身の責任でお願いします。<br>
  データ提供: Yahoo Finance
</p>

<script>
const API_BASE = 'https://us-earnings-research.onrender.com';

async function fetchAPI(ticker) {
  const ac = new AbortController();
  const timer = setTimeout(() => ac.abort(), 58000);
  try {
    const res = await fetch(`${API_BASE}/api/result?ticker=${encodeURIComponent(ticker)}`, {
      signal: ac.signal
    });
    clearTimeout(timer);
    if (!res.ok) throw new Error('データの取得に失敗しました。しばらく後にお試しください。');
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    return d;
  } catch (e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('タイムアウトしました。再度お試しください。');
    throw e;
  }
}

function fmt(v) {
  if (v == null) return null;
  const n = Math.abs(v);
  if (n >= 1e12) return `$${(v/1e12).toFixed(2)}T`;
  if (n >= 1e9)  return `$${(v/1e9).toFixed(2)}B`;
  if (n >= 1e6)  return `$${(v/1e6).toFixed(2)}M`;
  return `$${v.toFixed(2)}`;
}

function yoyRow(label, actual, yearAgo, yoyPct, isMoney = true) {
  const valFmt = v => v == null ? null : isMoney ? fmt(v) : `$${v.toFixed(2)}`;
  const valStr = valFmt(actual);
  if (valStr == null) {
    return `<div class="row"><span class="row-label">${label}</span><span class="row-val no-data">―</span></div>`;
  }
  let badge = '', hint = '';
  if (yoyPct != null) {
    const sign = yoyPct >= 0 ? '+' : '';
    const cls  = yoyPct >= 0 ? 'beat' : 'miss';
    badge = `<div class="badge ${cls}">${sign}${yoyPct.toFixed(1)}% 前年比</div>`;
  }
  if (yearAgo != null) {
    hint = `<div class="hint">前年同期: ${valFmt(yearAgo)}</div>`;
  }
  return `<div class="row">
    <span class="row-label">${label}</span>
    <div class="row-right"><div class="row-val">${valStr}</div>${badge}${hint}</div>
  </div>`;
}

function render(ticker, d) {
  const qLabel = d.quarter || '';

  let html = `
  <div class="ph-header">
    <div class="ph-icon">📊</div>
    <div>
      <div class="ph-title">${d.company || ticker}</div>
      <div class="ph-sub">${ticker}${qLabel ? ' · ' + qLabel + ' 決算' : ''}</div>
    </div>
  </div>`;

  // 決算サプライズ
  html += `<div class="section">
    <div class="sec-title">⚡ 決算サプライズ</div>
    ${yoyRow('売上高', d.rev_actual, d.rev_year_ago, d.rev_yoy_pct, true)}
    ${yoyRow('1株あたり利益（EPS）', d.eps_actual, d.eps_year_ago, d.eps_yoy_pct, false)}
  </div>`;

  // 経営の健全性
  let opRow = `<div class="row"><span class="row-label">営業利益率</span><span class="row-val no-data">―</span></div>`;
  if (d.op_margin != null) {
    const em  = d.op_margin >= 20 ? '🟢' : d.op_margin >= 10 ? '🟡' : '🔴';
    const col = d.op_margin >= 20 ? '#30d158' : d.op_margin >= 10 ? '#ff9f0a' : '#ff3b30';
    opRow = `<div class="row"><span class="row-label">営業利益率</span>
      <span class="row-val" style="color:${col}">${em} ${d.op_margin.toFixed(1)}%</span></div>`;
  }
  let fcfRow = `<div class="row"><span class="row-label">フリーキャッシュフロー</span><span class="row-val no-data">―</span></div>`;
  if (d.fcf != null) {
    const em  = d.fcf >= 0 ? '🟢' : '🔴';
    const col = d.fcf >= 0 ? '#30d158' : '#ff3b30';
    fcfRow = `<div class="row"><span class="row-label">フリーキャッシュフロー</span>
      <span class="row-val" style="color:${col}">${em} ${fmt(d.fcf)}</span></div>`;
  }
  html += `<div class="section">
    <div class="sec-title">🏥 経営の健全性</div>
    ${opRow}${fcfRow}
  </div>`;

  // 次回の案内
  const estLabel = d.next_date_estimated ? ' <span style="font-size:10px;color:#a0aec0">(推定)</span>' : '';
  const nextStr  = d.next_date ? d.next_date + estLabel : '―';
  let growthRow = '';
  if (d.rev_yoy_pct != null) {
    const sign = d.rev_yoy_pct >= 0 ? '+' : '';
    const col  = d.rev_yoy_pct >= 0 ? '#30d158' : '#ff3b30';
    growthRow = `<div class="row"><span class="row-label">売上成長率（前年比）</span>
      <span class="row-val" style="color:${col}">${sign}${d.rev_yoy_pct.toFixed(1)}%</span></div>`;
  }
  html += `<div class="section">
    <div class="sec-title">📅 次回の案内</div>
    <div class="row"><span class="row-label">次回決算予定日</span><span class="row-val">${nextStr}</span></div>
    ${growthRow}
  </div>`;

  html += `<div class="footer-date">📅 期: ${d.quarter || '―'}</div>`;

  document.getElementById('card').innerHTML = html;
  document.getElementById('card').classList.add('on');
  document.getElementById('disc').classList.add('on');
}

function setLoading(on, msg) {
  const el = document.getElementById('loading');
  el.classList.toggle('on', on);
  if (msg) el.querySelector('span') ? (el.querySelector('span').textContent = msg) : null;
}
function setError(msg) {
  const el = document.getElementById('err');
  el.textContent = msg;
  el.classList.toggle('on', !!msg);
}

async function doSearch() {
  const ticker = document.getElementById('inp').value.trim().toUpperCase();
  if (!ticker) return;

  setLoading(true);
  setError('');
  document.getElementById('card').classList.remove('on');
  document.getElementById('disc').classList.remove('on');

  // Render 無料プランはスリープ後の初回起動に最大50秒かかる
  const warmup = setTimeout(() => setLoading(true, 'サーバー起動中... (最大1分かかる場合があります)'), 6000);

  try {
    const data = await fetchAPI(ticker);
    render(ticker, data);
  } catch (e) {
    setError(e.message);
  } finally {
    clearTimeout(warmup);
    setLoading(false);
  }
}

function quick(t) {
  document.getElementById('inp').value = t;
  doSearch();
}

document.getElementById('inp').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
